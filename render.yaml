# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  # Backend API
  - type: web
    name: manoveil-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manoveil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: manoveil-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://manoveil.vercel.app
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
    healthCheckPath: /health
    plan: starter

databases:
  - name: manoveil-db
    databaseName: manoveil
    plan: starter
    postgresMajorVersion: "16"

  - name: manoveil-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
